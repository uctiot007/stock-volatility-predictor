<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Volatility Predictor Dashboard</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #0f172a; color: #e2e8f0; }
      .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .card { background: #111827; border: 1px solid #334155; border-radius: 16px; padding: 20px; margin-bottom: 16px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
      .metric { background: #1f2937; border-radius: 12px; padding: 16px; }
      .metric .label { color: #94a3b8; font-size: 0.9rem; margin-bottom: 6px; }
      .metric .value { font-size: 1.25rem; font-weight: 600; }
      table { width: 100%; border-collapse: collapse; margin-top: 10px; }
      th, td { padding: 10px 8px; border-bottom: 1px solid #334155; text-align: left; }
      .status { color: #22c55e; font-weight: 600; }
      .muted { color: #94a3b8; }
      code { background: #0f172a; padding: 2px 4px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Stock Volatility Predictor</h1>
        <p class="muted">A clearer view of the model comparison and experiment summary from the terminal pipeline.</p>
      </div>

      <div class="card">
        <h2>Executive summary</h2>
        <div id="summary" class="grid"></div>
      </div>

      <div class="card">
        <h2>Model comparison</h2>
        <table>
          <thead>
            <tr><th>Model</th><th>MSE</th></tr>
          </thead>
          <tbody id="rankings"></tbody>
        </table>
      </div>

      <div class="card">
        <h2>Configuration</h2>
        <div id="config" class="grid"></div>
      </div>
    </div>

    <script>
      async function loadDashboard() {
        const response = await fetch('/api/dashboard');
        const data = await response.json();

        const summaryEl = document.getElementById('summary');
        summaryEl.innerHTML = `
          <div class="metric">
            <div class="label">Best model</div>
            <div class="value">${data.summary.best_model}</div>
          </div>
          <div class="metric">
            <div class="label">Best MSE</div>
            <div class="value">${data.summary.best_mse.toExponential(6)}</div>
          </div>
          <div class="metric">
            <div class="label">Naive vs best</div>
            <div class="value">${data.summary.naive_vs_best.toExponential(6)}</div>
          </div>
          <div class="metric">
            <div class="label">Generated</div>
            <div class="value">${data.summary.generated_at}</div>
          </div>
        `;

        const rankingsEl = document.getElementById('rankings');
        rankingsEl.innerHTML = data.rankings.map(item => `
          <tr>
            <td>${item.name}</td>
            <td>${item.mse.toExponential(6)}</td>
          </tr>
        `).join('');

        const configEl = document.getElementById('config');
        const config = data.config || {};
        configEl.innerHTML = `
          <div class="metric"><div class="label">Lags</div><div class="value">${config.n_lags ?? 'n/a'}</div></div>
          <div class="metric"><div class="label">Include volume</div><div class="value">${config.include_volume ?? 'n/a'}</div></div>
          <div class="metric"><div class="label">Splits</div><div class="value">${config.n_splits ?? 'n/a'}</div></div>
          <div class="metric"><div class="label">ARIMA order</div><div class="value">${(config.arima_order || []).join(', ') || 'n/a'}</div></div>
        `;
      }

      loadDashboard();
    </script>
  </body>
</html>
